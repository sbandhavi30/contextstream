base: rest_api
description: GitHub API tool output — PRs, issues, commits, checks
fields:
  author: string | null — GitHub username
  confidence: float 0.0-1.0
  error: string | null — API or check error message if present
  repo: string — owner/repo format e.g. 'org/service-name'
  resource_id: string — PR number, issue number, commit SHA, or run ID
  resource_type: string — 'pull_request' | 'issue' | 'commit' | 'check_run' | 'workflow_run'
  state_change: string | null — what changed e.g. 'open→merged' 'pending→failure'
  status: string | null — 'open' | 'closed' | 'merged' | 'success' | 'failure' | 'pending'
  title: string | null — PR or issue title
model: claude-sonnet-4-6
